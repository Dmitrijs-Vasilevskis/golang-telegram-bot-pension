services:
  telegram-bot:
    build: .
    container_name: telegram_bot
    restart: unless-stopped
    env_file:
      - .env

    watchtower:
      image: containrrr/watchtower
      container_name: bot-watchtower
      restart: unless-stopped
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      command: --interval 300 telegram-bot